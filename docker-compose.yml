services:

  # ── CourseBeaver API ────────────────────────────────────────────────────────
  coursebeaver:
    build:
      context: .
      args:
        BASE: python:3.12-slim   # swap to nvidia/cuda:… for GPU
    image: coursebeaver:latest
    container_name: coursebeaver
    restart: unless-stopped
    ports:
      - "8766:8766"
    volumes:
      - ./data:/app/data           # persistent audio + DB
      - ./.env:/app/.env:ro        # API keys
    environment:
      HOST: "0.0.0.0"
      PORT: "8766"
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    depends_on:
      - ollama
    # GPU support (uncomment if using nvidia/cuda base image):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama (local LLM server) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU support (uncomment):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_models:
